# Custom iCE40 HX8K Board Template

board:
  name: "Custom iCE40 HX8K"
  vendor: "Custom"
  description: "通用 iCE40HX8K 模板。需要手动提供 PCF 约束和烧录方式。"
  url: ""

fpga:
  family: "ice40"
  device: "hx8k"
  package: "ct256"
  speed: ""

resources:
  clock: []
  leds: []
  buttons: []

constraints:
  pcf_file: ""

toolchain:
  synth:
    tool: "yosys"
    arch: "ice40"
    synth_options: ["-top", "${top_module}"]
    extra_options: []
  place_and_route:
    tool: "nextpnr-ice40"
    arch_options: ["--${device}", "--package", "${package}"]
    extra_options: []
  pack:
    tool: "icepack"
  program:
    tool: "openFPGALoader"
    interface: "usb"
    extra_options: []
