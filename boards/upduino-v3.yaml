# UPduino v3 Board Hardware Package

board:
  name: "UPduino v3"
  vendor: "TinyVision.ai"
  description: "Lattice iCE40UP5K 小型开发板。资源引脚请以官方原理图和工程约束为准。"
  url: "https://tinyvision.ai/products/upduino-v3-1"

fpga:
  family: "ice40"
  device: "up5k"
  package: "sg48"
  speed: ""

resources:
  clock:
    - name: "clk"
      pin: ""
      frequency: "12MHz"
  leds: []
  buttons: []

constraints:
  pcf_file: ""

toolchain:
  synth:
    tool: "yosys"
    arch: "ice40"
    synth_options: ["-top", "${top_module}"]
    extra_options: []

  place_and_route:
    tool: "nextpnr-ice40"
    arch_options: ["--${device}", "--package", "${package}"]
    extra_options: []

  pack:
    tool: "icepack"

  program:
    tool: "openFPGALoader"
    interface: "usb"
    extra_options: []
