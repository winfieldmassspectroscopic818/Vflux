# iCEBreaker Board Hardware Package
# 开源 FPGA 工具链 OSS CAD Suite 配合使用

board:
  name: "iCEBreaker"
  vendor: "1BitSquared"
  description: "基于 Lattice iCE40UP5K 的开源 FPGA 开发板，带 USB 接口"
  url: "https://1bitsquared.com/products/icebreaker"

fpga:
  family: "ice40"
  device: "up5k"
  package: "sg48"
  speed: ""

resources:
  clock:
    - name: "clk"
      pin: "35"
      frequency: "12MHz"
  leds:
    - name: "led_g"
      pin: "41"
    - name: "led_r"
      pin: "40"
  buttons:
    - name: "btn"
      pin: "17"
  uart:
    tx: "6"
    rx: "5"
  spi:
    flash_cs: "16"
    flash_sck: "15"
    flash_mosi: "14"
    flash_miso: "17"

constraints:
  pcf_file: ""

toolchain:
  synth:
    tool: "yosys"
    arch: "ice40"
    synth_options: ["-top", "${top_module}"]
    extra_options: []

  place_and_route:
    tool: "nextpnr-ice40"
    arch_options: ["--${device}", "--package", "${package}"]
    extra_options: []

  pack:
    tool: "icepack"

  program:
    tool: "iceprog"
    interface: "ftdi"
    extra_options: []
