# ULX3S 85F Board Hardware Package

board:
  name: "ULX3S 85F"
  vendor: "Radiona / EMARD"
  description: "Lattice ECP5 LFE5U-85F 开源开发板。不同批次资源较多，建议以项目 LPF 约束为准。"
  url: "https://github.com/emard/ulx3s"

fpga:
  family: "ecp5"
  device: "85k"
  package: "CABGA381"
  speed: "6"

resources:
  clock:
    - name: "clk_25mhz"
      pin: ""
      frequency: "25MHz"
  leds: []
  buttons: []

constraints:
  lpf_file: ""

toolchain:
  synth:
    tool: "yosys"
    arch: "ecp5"
    synth_options: ["-top", "${top_module}"]
    extra_options: []

  place_and_route:
    tool: "nextpnr-ecp5"
    arch_options: ["--${device}", "--package", "${package}", "--speed", "${speed}"]
    extra_options: []

  pack:
    tool: "ecppack"

  program:
    tool: "openFPGALoader"
    interface: "ftdi"
    extra_options: []
